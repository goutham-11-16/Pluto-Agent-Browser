<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>History — Pluto</title>
  <link rel="stylesheet" href="../styles/core.css">
  <style>
    body { background: var(--pluto-bg-deep); padding: 40px; font-family: var(--font-sans); color: var(--pluto-text-primary); }
    .history-page { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .history-header { display: flex; align-items: center; justify-content: space-between; }
    .history-title { font-size: 24px; font-weight: 700; color: var(--pluto-text-primary); margin: 0; }
    .clear-history-btn {
      background: var(--pluto-color-orange); color: #FFF; border-radius: 8px; padding: 8px 16px;
      font-size: 12.5px; font-weight: 600; cursor: pointer; border: none; transition: background 0.2s;
    }
    .clear-history-btn:hover { background: #e04b00; }
    .history-search {
      width: 100%; padding: 12px 18px; box-sizing: border-box;
      background: var(--pluto-bg-secondary);
      border: 1px solid var(--pluto-border);
      border-radius: 9999px;
      font-size: 13.5px; color: var(--pluto-text-primary);
      outline: none; transition: border-color 0.2s;
    }
    .history-search:focus { border-color: var(--pluto-color-orange); box-shadow: 0 0 0 3px rgba(255, 85, 0, 0.2); }
    .history-container { display: flex; flex-direction: column; gap: 16px; }
    .history-group {
      background: var(--pluto-bg-secondary);
      border: 1px solid var(--pluto-border);
      border-radius: 12px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .history-group-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--pluto-color-orange);
      padding-bottom: 8px; border-bottom: 1px solid var(--pluto-border-subtle);
      margin-bottom: 4px;
    }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 8px;
      cursor: pointer; transition: background 0.15s;
    }
    .history-item:hover { background: var(--pluto-bg-hover); }
    .history-icon {
      width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.08); font-size: 10px; font-weight: 700;
    }
    .history-icon img { width: 16px; height: 16px; border-radius: 2px; }
    .history-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
    .history-info-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-info-url { font-size: 11px; color: var(--pluto-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 11px; color: var(--pluto-text-tertiary); flex-shrink: 0; }
    .history-item-del {
      opacity: 0; font-size: 12px; color: var(--pluto-text-tertiary); cursor: pointer; padding: 2px 6px; border-radius: 4px;
    }
    .history-item:hover .history-item-del { opacity: 1; }
    .history-item-del:hover { background: rgba(247, 36, 28, 0.15); color: #F7241C; }
    .empty-history { text-align: center; padding: 40px; color: var(--pluto-text-tertiary); font-size: 14px; }
  </style>
</head>
<body>
<div class="history-page">
  <div class="history-header">
    <h1 class="history-title">History</h1>
    <button class="clear-history-btn" id="btn-clear-history">Clear browsing data</button>
  </div>
  <input class="history-search" type="text" placeholder="Search history..." id="history-search">
  
  <div class="history-container" id="history-container">
    <div class="empty-history">Loading history entries...</div>
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('history-container');
  const searchInput = document.getElementById('history-search');

  async function renderHistory(query = '') {
    if (!window.plutoAPI || !window.plutoAPI.getHistory) return;
    try {
      const items = await window.plutoAPI.getHistory();
      const filtered = query.trim()
        ? items.filter(i => (i.title || '').toLowerCase().includes(query.toLowerCase()) || (i.url || '').toLowerCase().includes(query.toLowerCase()))
        : items;

      if (!filtered || filtered.length === 0) {
        container.innerHTML = '<div class="empty-history">No history entries found.</div>';
        return;
      }

      // Group items by date
      const groups = {};
      filtered.forEach(item => {
        const d = new Date(item.timestamp || Date.now());
        const dateKey = d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        if (!groups[dateKey]) groups[dateKey] = [];
        groups[dateKey].push(item);
      });

      container.innerHTML = '';
      Object.keys(groups).forEach(dateStr => {
        const groupEl = document.createElement('div');
        groupEl.className = 'history-group';

        const titleEl = document.createElement('div');
        titleEl.className = 'history-group-title';
        titleEl.textContent = dateStr;
        groupEl.appendChild(titleEl);

        groups[dateStr].forEach(item => {
          const row = document.createElement('div');
          row.className = 'history-item';

          const d = new Date(item.timestamp);
          const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

          const iconContent = item.favicon
            ? `<img src="${escapeAttr(item.favicon)}" alt="">`
            : escapeHtml((item.title || 'P').substring(0, 2).toUpperCase());

          row.innerHTML = `
            <div class="history-icon">${iconContent}</div>
            <div class="history-info">
              <span class="history-info-title">${escapeHtml(item.title || item.url)}</span>
              <span class="history-info-url">${escapeHtml(item.url)}</span>
            </div>
            <span class="history-time">${escapeHtml(timeStr)}</span>
            <span class="history-item-del" title="Remove from history">✕</span>
          `;

          row.addEventListener('click', (e) => {
            if (e.target.closest('.history-item-del')) return;
            if (window.plutoAPI && window.plutoAPI.navigateTo) {
              window.plutoAPI.navigateTo(item.url);
            }
          });

          row.querySelector('.history-item-del').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (window.plutoAPI && window.plutoAPI.deleteHistoryItem) {
              await window.plutoAPI.deleteHistoryItem(item.id || item.url);
              renderHistory(searchInput.value);
            }
          });

          groupEl.appendChild(row);
        });

        container.appendChild(groupEl);
      });
    } catch (e) {
      container.innerHTML = '<div class="empty-history">Error loading history.</div>';
    }
  }

  function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function escapeAttr(str) {
    return String(str || '').replace(/"/g, '&quot;');
  }

  renderHistory();

  searchInput.addEventListener('input', () => renderHistory(searchInput.value));

  document.getElementById('btn-clear-history').addEventListener('click', async () => {
    if (confirm('Are you sure you want to clear browsing history?')) {
      if (window.plutoAPI && window.plutoAPI.clearHistory) {
        await window.plutoAPI.clearHistory();
        renderHistory();
      }
    }
  });
})();
</script>
</body>
</html>
