<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extensions</title>
  <link rel="stylesheet" href="../styles/core.css">
  <style>
    body {
      background: var(--pluto-bg-elevated);
      color: var(--pluto-text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 16px;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--pluto-border-strong);
      box-shadow: var(--pluto-shadow-lg);
    }
    .popup-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .ext-footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--pluto-border-subtle);
      display: flex;
      justify-content: flex-end;
    }
    .manage-ext-btn {
      background: var(--pluto-bg-tertiary);
      border: 1px solid var(--pluto-border-strong);
      color: var(--pluto-text-primary);
      padding: 6px 12px;
      border-radius: var(--radius-md);
      font-size: 11.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--duration-fast);
    }
    .manage-ext-btn:hover {
      background: var(--pluto-bg-hover);
      border-color: var(--pluto-color-orange);
      color: var(--pluto-color-orange);
    }
  </style>
</head>
<body>
<div>
  <div class="popup-title">Extensions</div>
  <div class="ext-row">
    <span>🛡️</span>
    <div class="ext-name">Pluto Shields Engine v2.0</div>
    <input type="checkbox" checked style="accent-color: var(--pluto-color-orange);">
  </div>
  <div class="ext-row">
    <span>🔑</span>
    <div class="ext-name">Pluto Password Manager</div>
    <input type="checkbox" checked style="accent-color: var(--pluto-color-orange);">
  </div>
  <div class="ext-footer">
    <button class="manage-ext-btn" id="btn-manage-extensions">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.4 0 2.5 1.1 2.5 2.5s-1.1 2.5-2.5 2.5H2v4c0 1.1.9 2 2 2h3.8v-1.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5V21H17c1.1 0 2-.9 2-2v-4h1.5c1.4 0 2.5-1.1 2.5-2.5s-1.1-2.5-2.5-2.5z"/></svg>
      Manage Extensions
    </button>
  </div>
</div>
<script>
  document.getElementById('btn-manage-extensions').addEventListener('click', () => {
    if (window.plutoAPI && window.plutoAPI.createTab) {
      window.plutoAPI.createTab('pluto://settings');
    }
  });
</script>
</body>
</html>
