<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pluto Web3 Wallet</title>
  <link rel="stylesheet" href="../styles/core.css">
  <style>
    body {
      background: var(--pluto-bg-elevated);
      color: var(--pluto-text-primary);
      font-family: var(--font-sans);
      margin: 0;
      padding: 16px;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--pluto-border-strong);
      box-shadow: var(--pluto-shadow-lg);
    }
    .popup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .popup-title { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
    .chip { background: rgba(120, 91, 175, 0.2); color: var(--pluto-color-alyssa); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 9999px; }
    .wallet-card {
      background: linear-gradient(135deg, rgba(120, 91, 175, 0.2), rgba(255, 85, 0, 0.15));
      border: 1px solid var(--pluto-border-accent); border-radius: 8px; padding: 14px; margin-bottom: 12px;
    }
    .balance-title { font-size: 11px; color: var(--pluto-text-secondary); }
    .balance-amount { font-size: 22px; font-weight: 700; color: var(--pluto-text-primary); margin: 2px 0; }
    .pills { display: flex; gap: 6px; margin-top: 10px; }
    .pill { flex: 1; background: var(--pluto-color-blurple); color: #FFF; border-radius: 9999px; padding: 4px 0; font-size: 11px; font-weight: 600; text-align: center; border: none; cursor: pointer; }
    .pill:hover { background: var(--pluto-color-blurple-hover); }
    .asset-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--pluto-border-subtle); }
    .asset-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; color: #FFF; }
    .asset-info { flex: 1; }
    .asset-name { font-size: 12px; font-weight: 600; }
    .asset-balance { font-size: 10px; color: var(--pluto-text-secondary); }
    .asset-val { font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>
<div>
  <div class="popup-header">
    <div class="popup-title">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#785BAF"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9z"/></svg>
      Pluto Wallet
    </div>
    <span class="chip">Ethereum Mainnet</span>
  </div>

  <div class="wallet-card">
    <div class="balance-title">Portfolio Balance</div>
    <div class="balance-amount">$2,845.20 USD</div>
    <div class="pills">
      <button class="pill">Buy</button>
      <button class="pill">Send</button>
      <button class="pill">Swap</button>
      <button class="pill">Deposit</button>
    </div>
  </div>

  <div class="asset-row">
    <div class="asset-icon" style="background:#627EEA;">ETH</div>
    <div class="asset-info">
      <div class="asset-name">Ethereum</div>
      <div class="asset-balance">0.85 ETH</div>
    </div>
    <div class="asset-val">$2,414.00</div>
  </div>

  <div class="asset-row" style="border:none;">
    <div class="asset-icon" style="background:#FF5500;">BAT</div>
    <div class="asset-info">
      <div class="asset-name">Basic Attention Token</div>
      <div class="asset-balance">1,540.0 BAT</div>
    </div>
    <div class="asset-val">$431.20</div>
  </div>
</div>
</body>
</html>
